<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>bstats - Deep Workspace Calibration</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a1a; color: #fff; margin: 0; padding: 20px; height: calc(100vh - 40px); display: flex; flex-direction: column; }
        h1 { margin: 0 0 15px 0; font-size: 24px; }
        .container { display: flex; gap: 20px; flex: 1; min-height: 0; }

        .sidebar {
            width: 360px;
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-sizing: border-box;
        }
        .instructions p { margin: 4px 0; font-size: 12px; color: #aaa; line-height: 1.3; }
        .active-step { color: #0070f3 !important; font-weight: bold; }
        .step-done { color: #4caf50 !important; text-decoration: line-through; opacity: 0.5; }

        .control-group { background: #222; padding: 12px; border-radius: 6px; display: flex; flex-direction: column; gap: 8px; }
        .control-item { display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
        select { background: #333; color: white; border: 1px solid #444; padding: 4px; border-radius: 4px; }

        .editor-header { display: flex; justify-content: space-between; align-items: center; margin: 0; }
        #jsonStatus { font-size: 11px; font-weight: bold; }
        textarea {
            flex: 1;
            background: #151515;
            color: #00ff66;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 10px;
            font-family: monospace;
            font-size: 11px;
            line-height: 1.3;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }

        .btn-matrix { display: flex; flex-direction: column; gap: 6px; }
        .btn-row { display: flex; gap: 6px; }
        button { color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; flex: 1; font-size: 12px; }

        #okClearBtn { background: #28a745; } #okClearBtn:disabled { background: #555; cursor: not-allowed; opacity: 0.3; }
        #okCoveredBtn { background: #17a2b8; } #okCoveredBtn:disabled { background: #555; cursor: not-allowed; opacity: 0.3; }
        #skipBtn { background: #e67e22; } #skipBtn:disabled { background: #555; cursor: not-allowed; opacity: 0.3; }
        #saveImmBtn { background: #6f42c1; } #saveImmBtn:disabled { background: #555; cursor: not-allowed; opacity: 0.3; }
        #resetBtn { background: #dc3545; }
        #saveBtn { background: #0070f3; } #saveBtn:disabled { background: #555; cursor: not-allowed; }

        .viewer-workspace { flex: 1; background: #111; border-radius: 8px; border: 2px dashed #444; overflow: auto; }
        canvas { display: block; cursor: crosshair; transform-origin: top left; }
    </style>
</head>
<body>
    <h1>🏀 Deep Court & Ball Calibration</h1>
    <div class="container">
        <div class="sidebar">
            <div class="instructions" id="stepsPanel">
                <h3>Workflow Steps</h3>
                <p id="step_corners" class="active-step">1. Click 4 corners of court boundary.</p>
                <p id="step_left">2. Drag box around LEFT rim.</p>
                <p id="step_right">3. Drag box around RIGHT rim.</p>
                <p id="step_ball" style="color: #aaa;">4. Ball Sampling (Awaiting components...)</p>
            </div>

            <div class="control-group">
                <div class="control-item">
                    <label>Workspace Zoom:</label>
                    <select id="zoomSelect" onchange="updateZoom()">
                        <option value="0.5">0.5x</option>
                        <option value="1" selected>1.0x</option>
                        <option value="2">2.0x</option>
                    </select>
                </div>
                <div class="control-item">
                    <label style="cursor:pointer;">Highlight Padding:</label>
                    <input type="checkbox" id="showPaddingCheck" checked onchange="draw()" style="cursor:pointer;">
                </div>
                <div class="control-item">
                    <label style="cursor:pointer;">Show Court/Rim Overlays:</label>
                    <input type="checkbox" id="showOverlaysCheck" checked onchange="draw()" style="cursor:pointer;">
                </div>
            </div>

            <div class="editor-header">
                <h4>Manual JSON Overwrite</h4>
                <div id="jsonStatus" style="color: #4caf50;">✅ Synced</div>
            </div>
            <textarea id="jsonEditor" spellcheck="false" oninput="syncFromJson()"></textarea>

            <div class="btn-matrix">
                <div class="btn-row">
                    <button id="okClearBtn" disabled onclick="confirmBallClassification('clear')">OK Clear</button>
                    <button id="okCoveredBtn" disabled onclick="confirmBallClassification('covered')">OK Covered</button>
                </div>
                <div class="btn-row">
                    <button id="skipBtn" disabled onclick="skipCurrentFrame()">Skip Frame</button>
                    <button id="saveImmBtn" disabled onclick="saveCalibration()">Save Immediately</button>
                </div>
                <hr style="border-color: #444; margin: 4px 0;">
                <div class="btn-row">
                    <button id="resetBtn" onclick="resetCalibration()">Reset All</button>
                    <button id="saveBtn" disabled onclick="saveCalibration()">Save Config</button>
                </div>
            </div>
        </div>

        <div class="viewer-workspace">
            <canvas id="canvas" width="2720" height="1880"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const zoomSelect = document.getElementById('zoomSelect');
        const showPaddingCheck = document.getElementById('showPaddingCheck');
        const showOverlaysCheck = document.getElementById('showOverlaysCheck');
        const jsonEditor = document.getElementById('jsonEditor');
        const jsonStatus = document.getElementById('jsonStatus');

        const okClearBtn = document.getElementById('okClearBtn');
        const okCoveredBtn = document.getElementById('okCoveredBtn');
        const skipBtn = document.getElementById('skipBtn');
        const saveImmBtn = document.getElementById('saveImmBtn');
        const saveBtn = document.getElementById('saveBtn');
        const ballStepText = document.getElementById('step_ball');

        const OFFSET = 400;
        let REQUIRED_SAMPLES = 5;
        let POOL_SIZE = 10;

        let state = 'corners';
        let currentPoolFrame = 1;

        let data = { court_corners: [], left_basket: null, right_basket: null, ball_samples: [] };
        let tempBallBox = null;

        const bgImg = new Image(); bgImg.src = '/frame.jpg';
        const sampleImages = [];

        fetch('/api/config')
            .then(res => res.json())
            .then(config => {
                REQUIRED_SAMPLES = config.required_samples;
                POOL_SIZE = config.pool_size;
                for (let i = 1; i <= POOL_SIZE; i++) {
                    const img = new Image(); img.src = `/ball_sample_${i}.jpg`;
                    sampleImages.push(img);
                }
                evaluatePipelineWorkflowState();
                updateTextarea();
            });

        bgImg.onload = () => { updateZoom(); draw(); };

        function getActiveImageContext() {
            if (state === 'ball_sampling' && sampleImages[currentPoolFrame - 1]) {
                return sampleImages[currentPoolFrame - 1];
            }
            return bgImg;
        }

        function getRelativeImageCoords(e) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: Math.round(((e.clientX - rect.left) * (canvas.width / rect.width)) - OFFSET),
                y: Math.round(((e.clientY - rect.top) * (canvas.height / rect.height)) - OFFSET)
            };
        }

        function updateZoom() {
            const z = parseFloat(zoomSelect.value);
            canvas.style.width = (canvas.width * z) + 'px';
            canvas.style.height = (canvas.height * z) + 'px';
        }

        function syncFromJson() {
            try {
                const parsed = JSON.parse(jsonEditor.value);
                if (!Array.isArray(parsed.court_corners) || !Array.isArray(parsed.ball_samples)) throw new Error();
                data = parsed;
                jsonStatus.textContent = "✅ Valid Data";
                jsonStatus.style.color = "#4caf50";
                currentPoolFrame = 1;
                tempBallBox = null;
                evaluatePipelineWorkflowState();
                draw();
            } catch (err) {
                jsonStatus.textContent = "⚠️ Invalid JSON";
                jsonStatus.style.color = "#f44336";
            }
        }

        function updateTextarea() {
            jsonEditor.value = JSON.stringify(data, null, 2);
            jsonStatus.textContent = "✅ Synced";
            jsonStatus.style.color = "#4caf50";
        }

        function evaluatePipelineWorkflowState() {
            document.getElementById('step_corners').className = '';
            document.getElementById('step_left').className = '';
            document.getElementById('step_right').className = '';
            ballStepText.className = '';

            okClearBtn.disabled = true; okCoveredBtn.disabled = true;
            skipBtn.disabled = true; saveImmBtn.disabled = true; saveBtn.disabled = true;

            if (data.court_corners.length < 4) {
                state = 'corners';
                document.getElementById('step_corners').className = 'active-step';
                ballStepText.textContent = `4. Ball Sampling (Collect ${REQUIRED_SAMPLES} frames)`;
            } else if (!data.left_basket) {
                state = 'left_basket';
                document.getElementById('step_corners').className = 'step-done';
                document.getElementById('step_left').className = 'active-step';
            } else if (!data.right_basket) {
                state = 'right_basket';
                document.getElementById('step_corners').className = 'step-done';
                document.getElementById('step_left').className = 'step-done';
                document.getElementById('step_right').className = 'active-step';
            } else if (data.ball_samples.length < REQUIRED_SAMPLES) {
                state = 'ball_sampling';
                document.getElementById('step_corners').className = 'step-done';
                document.getElementById('step_left').className = 'step-done';
                document.getElementById('step_right').className = 'step-done';
                ballStepText.className = 'active-step';

                skipBtn.disabled = false;
                if (data.ball_samples.length > 0) saveImmBtn.disabled = false;

                if (tempBallBox) {
                    okClearBtn.disabled = false;
                    okCoveredBtn.disabled = false;
                }

                const sampledFrames = data.ball_samples.map(s => s.sample_frame);
                while (sampledFrames.includes(currentPoolFrame) && currentPoolFrame <= POOL_SIZE) {
                    currentPoolFrame++;
                }

                if (currentPoolFrame > POOL_SIZE) {
                    alert(`⚠️ Pool exhausted! Saving available data automatically.`);
                    saveCalibration();
                    return;
                }

                ballStepText.textContent = `4. Ball Sampling (Progress: ${data.ball_samples.length}/${REQUIRED_SAMPLES} | Frame: ${currentPoolFrame}/${POOL_SIZE})`;
            } else {
                state = 'ready';
                document.querySelectorAll('#stepsPanel p').forEach(p => p.className = 'step-done');
                ballStepText.textContent = `4. Ball Sampling Complete (${data.ball_samples.length} logged)`;
                saveBtn.disabled = false;
            }
        }

        function confirmBallClassification(statusType) {
            if (!tempBallBox || state !== 'ball_sampling') return;

            data.ball_samples.push({
                sample_frame: currentPoolFrame,
                x: tempBallBox.x, y: tempBallBox.y,
                w: tempBallBox.w, h: tempBallBox.h,
                status: statusType
            });

            tempBallBox = null;
            currentPoolFrame++;
            evaluatePipelineWorkflowState();
            updateTextarea();
            draw();
        }

        function skipCurrentFrame() {
            if (state !== 'ball_sampling') return;
            tempBallBox = null;
            currentPoolFrame++;
            evaluatePipelineWorkflowState();
            updateTextarea();
            draw();
        }

        let isDragging = false; let dragStart = {x:0, y:0}; let currentMouse = {x:0, y:0};

        canvas.addEventListener('mousedown', (e) => {
            const coords = getRelativeImageCoords(e);
            if (state === 'corners') {
                data.court_corners.push(coords);
                evaluatePipelineWorkflowState();
                updateTextarea();
            } else if (state === 'left_basket' || state === 'right_basket' || state === 'ball_sampling') {
                isDragging = true; dragStart = coords; currentMouse = coords;
            }
            draw();
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            currentMouse = getRelativeImageCoords(e);
            draw();
        });

        canvas.addEventListener('mouseup', (e) => {
            if (!isDragging) return;
            isDragging = false;
            const dragEnd = getRelativeImageCoords(e);
            const box = {
                x: Math.min(dragStart.x, dragEnd.x), y: Math.min(dragStart.y, dragEnd.y),
                w: Math.abs(dragStart.x - dragEnd.x), h: Math.abs(dragStart.y - dragEnd.y)
            };

            if (state === 'left_basket') { data.left_basket = box; evaluatePipelineWorkflowState(); updateTextarea(); }
            else if (state === 'right_basket') { data.right_basket = box; evaluatePipelineWorkflowState(); updateTextarea(); }
            else if (state === 'ball_sampling') {
                tempBallBox = box;
                evaluatePipelineWorkflowState();
            }
            draw();
        });

        function resetCalibration() {
            data = { court_corners: [], left_basket: null, right_basket: null, ball_samples: [] };
            currentPoolFrame = 1; tempBallBox = null;
            evaluatePipelineWorkflowState();
            updateTextarea();
            draw();
        }

        function draw() {
            ctx.fillStyle = showPaddingCheck.checked ? '#2c303b' : '#111';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const activeImg = getActiveImageContext();
            if (activeImg && activeImg.complete) ctx.drawImage(activeImg, OFFSET, OFFSET, 1920, 1080);

            ctx.strokeStyle = '#666'; ctx.lineWidth = 1;
            ctx.strokeRect(OFFSET, OFFSET, 1920, 1080);

            if (showOverlaysCheck.checked) {
                if (data.court_corners && data.court_corners.length > 0) {
                    ctx.strokeStyle = '#0070f3'; ctx.lineWidth = 3; ctx.fillStyle = '#0070f3';
                    data.court_corners.forEach(pt => {
                        ctx.beginPath(); ctx.arc(pt.x + OFFSET, pt.y + OFFSET, 6, 0, 2*Math.PI); ctx.fill();
                    });
                    ctx.beginPath();
                    data.court_corners.forEach((pt, idx) => {
                        if (idx === 0) ctx.moveTo(pt.x + OFFSET, pt.y + OFFSET);
                        else ctx.lineTo(pt.x + OFFSET, pt.y + OFFSET);
                    });
                    if (data.court_corners.length === 4) ctx.closePath();
                    ctx.stroke();
                }

                if (data.left_basket) {
                    ctx.strokeStyle = '#4caf50'; ctx.lineWidth = 3;
                    ctx.strokeRect(data.left_basket.x + OFFSET, data.left_basket.y + OFFSET, data.left_basket.w, data.left_basket.h);
                }
                if (data.right_basket) {
                    ctx.strokeStyle = '#f44336'; ctx.lineWidth = 3;
                    ctx.strokeRect(data.right_basket.x + OFFSET, data.right_basket.y + OFFSET, data.right_basket.w, data.right_basket.h);
                }
            }

            // 🔥 FIXED: Only draw the ball boxes that belong strictly to the frame being viewed right now
            if (data.ball_samples && data.ball_samples.length > 0) {
                data.ball_samples.forEach(sample => {
                    if (state !== 'ball_sampling' || sample.sample_frame === currentPoolFrame) {
                        ctx.strokeStyle = sample.status === 'clear' ? '#28a745' : '#17a2b8';
                        ctx.lineWidth = 3;
                        ctx.strokeRect(sample.x + OFFSET, sample.y + OFFSET, sample.w, sample.h);
                    }
                });
            }

            if (tempBallBox && state === 'ball_sampling') {
                ctx.strokeStyle = '#ffeb3b'; ctx.lineWidth = 3;
                ctx.strokeRect(tempBallBox.x + OFFSET, tempBallBox.y + OFFSET, tempBallBox.w, tempBallBox.h);
            }

            if (isDragging) {
                ctx.strokeStyle = '#ffeb3b'; ctx.lineWidth = 2;
                ctx.strokeRect(Math.min(dragStart.x, currentMouse.x)+OFFSET, Math.min(dragStart.y, currentMouse.y)+OFFSET, Math.abs(currentMouse.x-dragStart.x), Math.abs(currentMouse.y-dragStart.y));
            }
        }

        function saveCalibration() {
            fetch('/api/save', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
            .then(res => { if(res.ok) { alert('Environment tracking criteria saved cleanly!'); window.close(); } });
        }
    </script>
</body>
</html>
